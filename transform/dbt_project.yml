name: 'orders_pipeline'
version: '1.0.0'
config-version: 2

profile: 'orders_pipeline'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  orders_pipeline:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table

seeds:
  orders_pipeline:
    customers:
      +column_types:
        customer_id: integer
        signup_date: date
    orders:
      +column_types:
        order_id: integer
        customer_id: integer
        order_date: date
    order_items:
      +column_types:
        order_item_id: integer
        order_id: integer
        quantity: integer
        unit_price: decimal(10,2)
